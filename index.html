const ADMIN_CODE   = "@adminyfadad";
const RE_CANDIDATE = /^[A-Z]{2}\d{3,}$/;
const RE_ADVISOR   = /^@[A-Za-z]{2,}ADV$/i;

function detectRole(raw) {
  if (!raw) return null;
  const v = raw.trim();
  if (!v) return null;
  if (v.toLowerCase() === ADMIN_CODE.toLowerCase()) return "admin";
  if (RE_ADVISOR.test(v))   return "advisor";
  if (RE_CANDIDATE.test(v)) return "candidate";
  return "unknown";
}

const ALL_Q = [...HQ, ...BQ, ...SQ];
const WTS = [5, 4, 3, 2, 1];

/* ─── SCORING ────────────────────────────────────────────────────────────── */
function scoreGroup(questions, keyFn, answers, offset) {
  const s = {}, n = {};
  questions.forEach((q, i) => {
    const k = keyFn(q);
    s[k] = s[k] || 0;
    n[k] = n[k] || 0;
    const a = answers[i + offset];
    if (a != null) { s[k] += WTS[a]; n[k]++; }
  });
  const out = {};
  Object.keys(s).forEach(k => {
    out[k] = Math.round((s[k] / ((n[k] || 5) * 5)) * 100);
  });
  return out;
}
function computeScores(ans) {
  return {
    h: scoreGroup(HQ, q => q.c, ans, 0),
    b: scoreGroup(BQ, q => q.t, ans, 30),
    s: scoreGroup(SQ, q => q.d, ans, 55),
  };
}
function ranked(sc) {
  return Object.keys(sc || {}).sort((a, b) => (sc[b] || 0) - (sc[a] || 0));
}
function avg(sc) {
  const v = Object.values(sc || {});
  return v.length ? Math.round(v.reduce((a, b) => a + b, 0) / v.length) : 0;
}

          med:"درجتك ("+v+"%) في البُعد الاجتماعي تُظهر كفاءة حقيقية في العمل الجماعي والتواصل. أنت قادر على بناء علاقات مهنية بنّاءة بفاعلية.<br/><br/>ابحث بنشاط عن تجارب عمل تعاونية لتعزيز مهاراتك في العلاقات الإنسانية.",
          lo:"درجتك ("+v+"%) في البُعد الاجتماعي تُشير إلى أنك تُفضّل البيئات الأقل تفاعلاً مستمراً. تكمن قوّتك في أبعاد أخرى — استفد منها."},
        E:{hi:"درجتك العالية جداً في البُعد الريادي ("+v+"%) تكشف عن طابع قيادي قوي وميل طبيعي للمبادرة. مجالات التجارة والإدارة وريادة الأعمال تتوافق مع هذا الملف.<br/><br/>طوّر مهاراتك في الإدارة المالية والقيادة الاستراتيجية. مسار في مدرسة الأعمال أو إطلاق مشروعك الخاص سيكونان محرّكَين قويَّين.",
          med:"درجتك ("+v+"%) في البُعد الريادي تُظهر كفاءة ملحوظة في المبادرة وصنع القرار. يمكنك تحمّل مخاطر محسوبة والتأكيد على نفسك في السياقات التنافسية.<br/><br/>ابحث عن فرص قيادية (إدارة المشاريع، الإشراف) لتعزيز هذا البُعد.",
          lo:"درجتك ("+v+"%) في البُعد الريادي تُشير إلى أن المخاطرة والقيادة ليستا توجهيك الطبيعيين المهيمنين. البيئات المنظمة ذات الأهداف الواضحة تناسبك أكثر."},
        C:{hi:"درجتك العالية جداً في البُعد التقليدي ("+v+"%) تُعبّر عن طابع صارم ومنهجي. مجالات المحاسبة والقانون والإدارة والمالية تتوافق تماماً مع ملفك.<br/><br/>توجّه نحو التدريب في الإدارة أو المحاسبة. الشهادات المهنية (CPA، CIMA) ستعزز مصداقيتك.",
          med:"درجتك ("+v+"%) في البُعد التقليدي تُشير إلى قدرة جيدة على العمل في الأطر المنظمة واحترام الإجراءات المعتمدة.<br/><br/>تعرّف على أدوات إدارة المشاريع وأساليب تنظيم العمل.",

      }
    };
    var lg = narr[reportLang]||narr.fr;
    var dim = lg[k]||lg.R;
    return v>=65 ? dim.hi : v>=40 ? dim.med : dim.lo;
  }

function openReport(html, filename) {
  /* Try Blob download */
  try {
    var blob = new Blob([html], { type:"text/html;charset=utf-8" });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement("a");
    a.href = url; a.download = filename || "CareerMap-Report.html";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); }, 300);
    return;
  } catch(e1) {}
  /* Fallback: new tab */
  try {
    var w = window.open("", "_blank");
    if (w) { w.document.open(); w.document.write(html); w.document.close(); return; }
  } catch(e2) {}
  /* Last fallback: data URI */
  try {
    var a2 = document.createElement("a");
    a2.href = "data:text/html;charset=utf-8," + encodeURIComponent(html);
    a2.download = filename || "CareerMap-Report.html";
    document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
  } catch(e3) {}
}

/* ─── SPEEDOMETER GAUGE ──────────────────────────────────────────────────── */
function SpeedoGauge({ selected, onSelect, opts }) {
  var W=340, H=200, cx=170, cy=190, RO=148, RI=50, CR=16;

  function toRad(deg){ return deg * Math.PI / 180; }
  function pt(deg, r){ return { x: cx + r*Math.cos(toRad(deg)), y: cy - r*Math.sin(toRad(deg)) }; }

  function segPath(a1, a2) {
    var p1=pt(a1,RO), p2=pt(a2,RO), p3=pt(a2,RI), p4=pt(a1,RI);
    return "M "+p1.x+" "+p1.y+
           " A "+RO+" "+RO+" 0 0 0 "+p2.x+" "+p2.y+
           " L "+p3.x+" "+p3.y+
           " A "+RI+" "+RI+" 0 0 1 "+p4.x+" "+p4.y+" Z";
  }

  var SEGS = [[180,144],[144,108],[108,72],[72,36],[36,0]];
  var MIDS = [162, 126, 90, 54, 18];

  /* Bright colours for selected segment — each segment gets its own accent */
  var SEG_COLS = ["#e53935","#fb8c00","#fdd835","#43a047","#00acc1"];

  var hasSel  = selected !== null && selected !== undefined;
  var needDeg = hasSel ? MIDS[selected] : 90;
  var tip     = pt(needDeg, RO * 0.72);
  var tail    = pt(needDeg + 180, 18);

  return (
    <svg width="100%" viewBox={"0 0 "+W+" "+H}
      style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id="sg_chrome" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stopColor="#f5f5f5"/>
          <stop offset="18%"  stopColor="#d8d8d8"/>
          <stop offset="52%"  stopColor="#a0a0a0"/>
          <stop offset="82%"  stopColor="#888"/>
          <stop offset="100%" stopColor="#c8c8c8"/>
        </linearGradient>
        <linearGradient id="sg_shine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="rgba(255,255,255,.55)"/>
          <stop offset="38%"  stopColor="rgba(255,255,255,0)"/>
          <stop offset="62%"  stopColor="rgba(255,255,255,0)"/>
          <stop offset="100%" stopColor="rgba(255,255,255,.35)"/>
        </linearGradient>
      </defs>

      {/* ── Outer chrome ring ── */}
      <path
        d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+
            " A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y+
            " L "+pt(0,RO).x+" "+pt(0,RO).y+
            " A "+RO+" "+RO+" 0 0 1 "+pt(180,RO).x+" "+pt(180,RO).y+" Z"}
        fill="url(#sg_chrome)"/>
      <path
        d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+
            " A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y+
            " L "+pt(0,RO).x+" "+pt(0,RO).y+
            " A "+RO+" "+RO+" 0 0 1 "+pt(180,RO).x+" "+pt(180,RO).y+" Z"}
        fill="url(#sg_shine)"/>
      <path d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+" A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y}
        fill="none" stroke="#ddd" strokeWidth={1}/>
      <path d={"M "+pt(180,RO).x+" "+pt(180,RO).y+" A "+RO+" "+RO+" 0 0 0 "+pt(0,RO).x+" "+pt(0,RO).y}
        fill="none" stroke="#666" strokeWidth={1}/>

      {/* ── Segments ── */}
      {SEGS.map(function(s, i){
        var isSel = selected === i;
        return (
          <path key={i} d={segPath(s[0], s[1])}
            fill={isSel ? SEG_COLS[i] : "#167070"}
            onClick={function(){ onSelect(i); }}
            style={{ cursor:"pointer", transition:"fill .15s" }}/>
        );
      })}

      {/* Segment dividers */}
      {[144,108,72,36].map(function(deg){
        var a=pt(deg,RI+1), b=pt(deg,RO-1);
        return <line key={deg} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
          stroke="rgba(0,0,0,.4)" strokeWidth={1.5}/>;
      })}

      {/* Bottom flat fill */}
      <rect x={cx-RO} y={cy-4} width={RO*2} height={8} fill="#167070"/>

      {/* ── Labels ── */}
      {MIDS.map(function(deg, i){
        var lp    = pt(deg, (RO+RI)/2);
        var words = (opts[i]||"").split(" ");
        var isSel = selected === i;
        return (
          <text key={i} x={lp.x} y={lp.y}
            textAnchor="middle" dominantBaseline="middle"
            fill={isSel ? "#fff" : "rgba(255,255,255,.75)"}
            fontSize={isSel ? 11 : 9}
            fontWeight={isSel ? "900" : "500"}
            fontFamily="Arial,sans-serif"
            onClick={function(){ onSelect(i); }}
            style={{ cursor:"pointer", transition:"fill .15s, font-size .15s" }}>
            {words.map(function(w, j){
              return <tspan key={j} x={lp.x} dy={j===0 ? -((words.length-1)*6) : 12}>
                {w.toUpperCase()}
              </tspan>;
            })}
          </text>
        );
      })}

      {/* ── Needle / Arrow — drawn directly, no CSS transition issues ── */}
      {hasSel && (
        <g>
          {/* Shadow */}
          <line x1={cx+1} y1={cy+1} x2={tip.x+1} y2={tip.y+1}
            stroke="rgba(0,0,0,.3)" strokeWidth={5} strokeLinecap="round"/>
          {/* Main needle shaft */}
          <line x1={cx} y1={cy} x2={tip.x} y2={tip.y}
            stroke="#ffffff" strokeWidth={4} strokeLinecap="round"/>
          {/* Arrowhead triangle */}
          {(function(){
            var ang   = Math.atan2(cy - tip.y, tip.x - cx);
            var aw    = 9;
            var al    = 18;
            var bx    = tip.x - al*Math.cos(ang);
            var by    = tip.y + al*Math.sin(ang);
            var lx    = bx - aw*Math.sin(ang);
            var ly    = by - aw*Math.cos(ang);
            var rx    = bx + aw*Math.sin(ang);
            var ry    = by + aw*Math.cos(ang);
            return <polygon
              points={tip.x+","+tip.y+" "+lx+","+ly+" "+rx+","+ry}
              fill="#ffffff"/>;
          })()}
          {/* Counterweight */}
          <line x1={cx} y1={cy} x2={tail.x} y2={tail.y}
            stroke="rgba(255,255,255,.4)" strokeWidth={4} strokeLinecap="round"/>
        </g>
      )}

      {/* ── Hub ── */}
      <circle cx={cx} cy={cy} r={20} fill="#0a3a3a" stroke="#777" strokeWidth={2}/>
      <circle cx={cx} cy={cy} r={11}
        fill={hasSel ? SEG_COLS[selected] : "#334"}
        style={{ transition:"fill .15s" }}/>
      <circle cx={cx} cy={cy} r={5} fill="rgba(255,255,255,.75)"/>
    </svg>
  );
}

function Login({ lang, setLang, onLogin, advisors }) {
  injectCSS();
  var ar = lang === "ar";
  var [val, setVal] = useState("");
  var [err, setErr] = useState("");
  var role = detectRole(val);

  var RCOL = { admin:C.gr, advisor:C.pu, candidate:C.teal, unknown:C.re };
  var RBG  = { admin:"rgba(29,184,122,.15)", advisor:"rgba(144,80,208,.15)", candidate:"rgba(26,171,170,.15)", unknown:"rgba(220,76,60,.12)" };
  var RICO = { admin:"⚙️", advisor:"👔", candidate:"🎓", unknown:"❌" };
  var RLBL = {
    admin:     ar ? "مدير النظام"        : lang==="fr" ? "Administrateur"    : "Administrator",
    advisor:   ar ? "مستشار"             : lang==="fr" ? "Conseiller"         : "Advisor",
    candidate: ar ? "مترشح"              : lang==="fr" ? "Candidat"           : "Candidate",
    unknown:   ar ? "صيغة غير معروفة"   : lang==="fr" ? "Format non reconnu" : "Unrecognised format",
  };

  function submit() {
    var v = val.trim();
    if (!v) { setErr(ar ? "أدخل كود الوصول." : "Please enter your access code."); return; }
    if (role === "admin") { onLogin({ name:"Administrator", id:"admin", role:"admin" }); return; }
    if (role === "advisor") {
      var found = (advisors || []).find(function(a) { return a.code.toLowerCase() === v.toLowerCase(); });
      if (!found) { setErr(ar ? "كود غير صالح." : "Invalid code. Contact the admin."); return; }
      onLogin({ name:found.name, id:v, role:"advisor" }); return;
    }
    if (role === "candidate") { onLogin({ name:"", id:v.toUpperCase(), role:"candidate" }); return; }
    setErr(ar ? "كود غير صالح." : "Invalid code. Please try again.");
  }

  var borderColor = (role && role !== "unknown") ? RCOL[role] : C.bdr;
  var btnBg = (role && role !== "unknown")
    ? "linear-gradient(135deg," + RCOL[role] + "," + RCOL[role] + "cc)"
    : "linear-gradient(135deg," + C.gold + "," + C.goldL + ")";

  return (
    <div style={{ height:"100%", background:C.bg, display:"flex", alignItems:"center",
        justifyContent:"center", padding:20, position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", left:-80, top:-80, width:280, height:280,
          borderRadius:"50%", background:C.goldG, filter:"blur(60px)", animation:"glow 4s ease-in-out infinite" }}/>
      <div style={{ position:"absolute", right:-60, bottom:-60, width:240, height:240,
          borderRadius:"50%", background:C.tealG, filter:"blur(60px)", animation:"glow 4s ease-in-out 2s infinite" }}/>
      <div style={{ position:"absolute", top:14, right:ar?undefined:14, left:ar?14:undefined, zIndex:9 }}>
        <LangBtn lang={lang} set={setLang}/>
      </div>

      <div className="fadeUp" style={{ background:C.card, borderRadius:22, padding:"34px 24px",
          width:"100%", maxWidth:400, border:"1px solid "+C.bdr,
          position:"relative", zIndex:5, boxShadow:"0 0 60px rgba(0,0,0,.5)" }}>

        <div style={{ textAlign:"center", marginBottom:12 }}>
          <div style={{ display:"flex", justifyContent:"center", marginBottom:10 }}>
            <CareerMapLogo size={90}/>
          </div>
          <h1 className="sy" style={{ fontSize:24, color:C.wh, letterSpacing:.5, fontWeight:900 }}>
            Career<span style={{ color:C.teal }}>Map</span>
          </h1>
        </div>
        <p style={{ textAlign:"center", color:C.mu, fontSize:11, marginBottom:24 }}>
          {ar ? "خريطة مسارك المهني والشخصي" : lang==="fr" ? "Cartographiez votre parcours de carrière" : "Map Your Career & Personality Path"}
        </p>

        <label style={{ display:"block", fontSize:9, fontWeight:700, color:C.mu,
            marginBottom:6, letterSpacing:.9, textTransform:"uppercase" }}>
          {ar ? "كود الوصول" : lang==="fr" ? "Code d'Accès" : "Access Code"}
        </label>
        <input
          autoFocus value={val}
          onChange={function(e) { var v = e.target.value; if (!v.startsWith("@")) v = v.toUpperCase(); setVal(v); setErr(""); }}
          onKeyDown={function(e) { if (e.key === "Enter") submit(); }}
          placeholder=""
          style={{ width:"100%", padding:"13px 14px", background:"rgba(255,255,255,.04)",
            border:"2px solid "+borderColor, borderRadius:11, fontSize:14, fontFamily:"monospace",
            color:C.wh, marginBottom:12, transition:"border-color .2s", letterSpacing:1 }}
        />

        {err && <p style={{ color:C.re, fontSize:11, marginBottom:10 }}>{err}</p>}

        <button onClick={submit}
          style={{ width:"100%", padding:15, background:btnBg,
            color:C.bg, border:"none", borderRadius:12,
            fontFamily:"inherit", fontSize:15, fontWeight:800 }}>
          {ar ? "← متابعة" : lang==="fr" ? "Continuer →" : "Continue →"}
        </button>


      </div>
    </div>
  );
}

/* ─── PROFILE FORM HELPERS ──────────────────────────────────────────────── */
function FloatInput({ label, value, onChange, placeholder, type, ok, err, autoFocus }) {
  var col = err ? C.re : ok ? C.gr : C.bdr;
  var lCol = err ? C.re : ok ? C.gr : C.mu;
  return (
    <div>
      <div style={{ fontSize:9, fontWeight:700, color:lCol, marginBottom:5, letterSpacing:.8,
          textTransform:"uppercase", display:"flex", alignItems:"center", gap:3 }}>
        {label} {ok && <span style={{ color:C.gr }}>✓</span>} <span style={{ color:C.re }}>*</span>
      </div>
      <input type={type||"text"} value={value} placeholder={placeholder} autoFocus={autoFocus}
        onChange={function(e){ onChange(e.target.value); }}
        style={{ width:"100%", padding:"12px 13px", background:"rgba(255,255,255,.04)",
          border:"1.5px solid "+col, borderRadius:10, color:C.wh, fontSize:13,
          transition:"border-color .2s", boxSizing:"border-box" }}/>
    </div>
  );
}
function FieldLabel({ children }) {
  return (
    <div style={{ fontSize:9, fontWeight:700, color:C.mu, marginBottom:6,
        letterSpacing:.8, textTransform:"uppercase" }}>
      {children} <span style={{ color:C.re }}>*</span>
    </div>
  );
}

/* ─── PROFILE FORM ───────────────────────────────────────────────────────── */
function ProfileForm({ lang, setLang, user, onNext, onLogout }) {
  var ar = lang === "ar";
  var [pf, setPf] = useState({ firstName:"", lastName:"", email:"", phone:"", age:"", gender:"", edu:"", region:"", prefecture:"", status:"", photo:"" });
  var isCasa = pf.region === "Casablanca-Settat";
  var ok = pf.firstName && pf.lastName && pf.email && pf.phone && pf.age && pf.gender && pf.edu && pf.region && pf.status && (!isCasa || pf.prefecture);

  /* scroll refs */
  var scrollRef    = useRef(null);   // the scrollable container
  var prefRef      = useRef(null);   // the prefecture section

  /* Auto-scroll to prefecture field when Casablanca is selected */
  useEffect(function() {
    if (isCasa && prefRef.current) {
      setTimeout(function() {
        prefRef.current.scrollIntoView({ behavior:"smooth", block:"start" });
      }, 120);
    }
  }, [isCasa]);

  function setField(k) {
    return function(v) {
      setPf(function(p) {
        var next = Object.assign({}, p, { [k]: v });
        if (k === "region") next.prefecture = "";
        return next;
      });
    };
  }

  var photoRef = useRef(null);
  function handlePhoto(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) { setPf(function(p){ return Object.assign({},p,{photo:ev.target.result}); }); };
    reader.readAsDataURL(file);
  }

  var [submitErr, setSubmitErr] = useState("");

  var iStyle = { width:"100%", padding:"11px 12px", background:"rgba(255,255,255,.04)",
    border:"1.5px solid "+C.bdr, borderRadius:10, color:C.wh, fontSize:13 };
  var lStyle = { display:"block", fontSize:9, fontWeight:700, color:C.mu,
    marginBottom:5, letterSpacing:.8, textTransform:"uppercase" };
  var regionList  = MOROCCO_REGIONS;
  var genderList  = GENDERS[lang]  || GENDERS.en;
  var eduList     = EDUS[lang]     || EDUS.en;
  var statusList  = STATUSES[lang] || STATUSES.en;

  function handleNext() {
    var missing = [];
    if (!pf.firstName) missing.push(ar ? "الاسم الشخصي" : lang==="fr" ? "Prénom" : "First Name");
    if (!pf.lastName)  missing.push(ar ? "اسم العائلة" : lang==="fr" ? "Nom de famille" : "Last Name");
    var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(pf.email);
    if (!pf.email)     missing.push(ar ? "البريد الإلكتروني" : lang==="fr" ? "Email" : "Email");
    else if (!emailOk) missing.push(ar ? "صيغة البريد غير صحيحة" : lang==="fr" ? "Format email invalide (ex: nom@email.com)" : "Invalid email (e.g. name@email.com)");
    var phoneOk = /^[+]?[\d\s\-().]{8,15}$/.test(pf.phone);
    if (!pf.phone)     missing.push(ar ? "رقم الهاتف" : lang==="fr" ? "Téléphone" : "Phone");
    else if (!phoneOk) missing.push(ar ? "رقم الهاتف غير صحيح" : lang==="fr" ? "Numéro invalide" : "Invalid phone number");
    if (!pf.age)       missing.push(ar ? "الفئة العمرية" : lang==="fr" ? "Tranche d'âge" : "Age Group");
    if (!pf.gender)    missing.push(ar ? "الجنس" : lang==="fr" ? "Genre" : "Gender");
    if (!pf.edu)       missing.push(ar ? "المستوى الدراسي" : lang==="fr" ? "Niveau d'études" : "Education Level");
    if (!pf.status)    missing.push(ar ? "الوضعية المهنية" : lang==="fr" ? "Situation professionnelle" : "Occupation Status");
    if (!pf.region)    missing.push(ar ? "الجهة" : lang==="fr" ? "Région" : "Region");
    if (isCasa && !pf.prefecture) missing.push(ar ? "العمالة/المقاطعة" : lang==="fr" ? "Préfecture" : "Prefecture");
    if (missing.length > 0) {
      setSubmitErr((ar ? "يرجى إكمال: " : lang==="fr" ? "Veuillez compléter : " : "Please fill in: ") + missing.join(" · "));
      return;
    }
    setSubmitErr("");
    onNext(pf);
  }

  var pfTotal  = isCasa ? 10 : 9;
  var pfFilled = [pf.firstName,pf.lastName,pf.email,pf.phone,pf.age,pf.gender,pf.edu,pf.status,pf.region].concat(isCasa?[pf.prefecture]:[]).filter(Boolean).length;
  var pfPct    = Math.round(pfFilled / pfTotal * 100);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <TopBar lang={lang} setLang={setLang} user={user} onLogout={onLogout}/>

      {/* ── HEADER ── */}
      <div style={{ background:"linear-gradient(160deg,"+C.sur+","+C.cardB+")", borderBottom:"1px solid "+C.bdr, padding:"14px 16px", flexShrink:0 }}>
        <div style={{ maxWidth:480, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize:10, color:C.mu, marginBottom:2, letterSpacing:.5 }}>
                {ar?"رقمك":lang==="fr"?"Votre ID":"Your ID"}{" · "}
                <span style={{ color:C.teal, fontFamily:"monospace", fontWeight:700 }}>{user.id}</span>
              </div>
              <div className="sy" style={{ fontSize:15, fontWeight:800, color:C.wh }}>
                {ar?"معلوماتك الشخصية":lang==="fr"?"Vos informations":"Your Information"}
              </div>
            </div>
            <button onClick={handleNext} style={{
              padding:"11px 20px",
              background: ok ? "linear-gradient(135deg,"+C.gold+","+C.goldL+")" : "rgba(255,255,255,.08)",
              color: ok ? C.bg : C.mu,
              border: ok ? "none" : "1.5px solid "+C.bdr,
              borderRadius:12, fontFamily:"inherit", fontSize:13, fontWeight:800,
              cursor:"pointer", display:"flex", alignItems:"center", gap:6,
              transition:"all .2s", boxShadow: ok ? "0 4px 18px "+C.goldG : "none"
            }}>
              {ok && <span>✓</span>}
              <span>{ar?"التالي →":lang==="fr"?"Suivant →":"Next →"}</span>
            </button>
          </div>

          {submitErr && (
            <div style={{ marginTop:8, padding:"7px 12px", background:C.re+"18",
                border:"1px solid "+C.re+"40", borderRadius:8, fontSize:10, color:C.re }}>
              ⚠️ {submitErr}
            </div>
          )}
        </div>
      </div>

      {/* ── SCROLLABLE FORM ── */}
      <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"16px 15px 40px" }}>
        <div style={{ maxWidth:480, margin:"0 auto" }}>

          {/* ── Identity ── */}
          <SectionHead icon="👤" title={ar?"الهوية":lang==="fr"?"Identité":"Identity"}/>

          {/* Photo upload — optional */}
          <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:16 }}>
            <div onClick={function(){ photoRef.current && photoRef.current.click(); }}
              style={{ width:72, height:72, borderRadius:"50%", overflow:"hidden", flexShrink:0,
                background:"rgba(255,255,255,.06)", border:"2px dashed "+C.bdr,
                display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer",
                transition:"border-color .2s", position:"relative" }}>
              {pf.photo
                ? <img src={pf.photo} alt="photo" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                : <span style={{ fontSize:28, opacity:.4 }}>👤</span>}
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:C.wh, marginBottom:4 }}>
                {ar?"الصورة الشخصية":lang==="fr"?"Photo de profil":"Profile photo"}
                <span style={{ marginLeft:6, fontSize:9, color:C.mu, fontWeight:400 }}>
                  ({ar?"اختياري":lang==="fr"?"optionnel":"optional"})
                </span>
              </div>
              <button onClick={function(){ photoRef.current && photoRef.current.click(); }}
                style={{ padding:"6px 14px", background:"rgba(255,255,255,.07)", border:"1.5px solid "+C.bdr,
                  borderRadius:8, color:C.mu, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                {pf.photo
                  ? (ar?"تغيير الصورة":lang==="fr"?"Changer":"Change photo")
                  : (ar?"رفع صورة":lang==="fr"?"Ajouter une photo":"Upload photo")}
              </button>
              {pf.photo && (
                <button onClick={function(){ setPf(function(p){ return Object.assign({},p,{photo:""}); }); }}
                  style={{ marginLeft:8, padding:"6px 10px", background:"transparent", border:"none",
                    color:C.re, fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>✕</button>
              )}
              <input ref={photoRef} type="file" accept="image/*" onChange={handlePhoto}
                style={{ display:"none" }}/>
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
            <FloatInput label={ar?"الاسم الشخصي":lang==="fr"?"Prénom":"First Name"}
              value={pf.firstName} placeholder={ar?"الاسم":lang==="fr"?"Prénom":"First"} autoFocus
              ok={!!pf.firstName}
              onChange={function(v){ setField("firstName")(v); setSubmitErr(""); }}/>
            <FloatInput label={ar?"اسم العائلة":lang==="fr"?"Nom":"Last Name"}
              value={pf.lastName} placeholder={ar?"اسم العائلة":lang==="fr"?"Nom":"Last"}
              ok={!!pf.lastName}
              onChange={function(v){ setField("lastName")(v); setSubmitErr(""); }}/>
          </div>

          {/* ── Contact ── */}
          <SectionHead icon="📬" title={ar?"التواصل":lang==="fr"?"Contact":"Contact"}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
            <FloatInput label="Email" value={pf.email} type="email" placeholder="name@email.com"
              ok={!!pf.email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(pf.email)}
              err={!!pf.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(pf.email)}
              onChange={function(v){ setField("email")(v); setSubmitErr(""); }}/>
            <FloatInput label={ar?"الهاتف":lang==="fr"?"Téléphone":"Phone"} value={pf.phone} type="tel"
              placeholder="+212 6XX..."
              ok={!!pf.phone && /^[+]?[\d\s\-().]{8,15}$/.test(pf.phone)}
              err={!!pf.phone && !/^[+]?[\d\s\-().]{8,15}$/.test(pf.phone)}
              onChange={function(v){ setField("phone")(v); setSubmitErr(""); }}/>
          </div>

          {/* ── Profile ── */}
          <SectionHead icon="📊" title={ar?"البيانات الشخصية":lang==="fr"?"Profil":"Profile"}/>

          {/* Gender toggle */}
          <div style={{ marginBottom:14 }}>
            <FieldLabel>{ar?"الجنس":lang==="fr"?"Genre":"Gender"}</FieldLabel>
            <div style={{ display:"flex", gap:8 }}>
              {genderList.map(function(g){
                var sel = pf.gender === g;
                return (
                  <button key={g} onClick={function(){ setField("gender")(g); setSubmitErr(""); }}
                    style={{ flex:1, padding:"12px 0", borderRadius:11, cursor:"pointer",
                      border:"1.5px solid "+(sel ? C.teal : C.bdr),
                      background: sel ? C.teal+"22" : "rgba(255,255,255,.03)",
                      color: sel ? C.teal : C.mu, fontSize:13, fontWeight:700,
                      transition:"all .15s" }}>
                    {g}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Age pills */}
          <div style={{ marginBottom:14 }}>
            <FieldLabel>{ar?"الفئة العمرية":lang==="fr"?"Tranche d'âge":"Age Group"}</FieldLabel>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7 }}>
              {AGES.map(function(a){
                var sel = pf.age === a;
                return (
                  <button key={a} onClick={function(){ setField("age")(a); setSubmitErr(""); }}
                    style={{ padding:"10px 0", borderRadius:10, cursor:"pointer",
                      border:"1.5px solid "+(sel ? C.gold : C.bdr),
                      background: sel ? C.gold+"22" : "rgba(255,255,255,.03)",
                      color: sel ? C.gold : C.mu, fontSize:11, fontWeight:700,
                      transition:"all .15s" }}>
                    {a}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Status pills 2-col */}
          <div style={{ marginBottom:14 }}>
            <FieldLabel>{ar?"الوضعية":lang==="fr"?"Situation":"Status"}</FieldLabel>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7 }}>
              {statusList.map(function(s){
                var sel = pf.status === s;
                return (
                  <button key={s} onClick={function(){ setField("status")(s); setSubmitErr(""); }}
                    style={{ padding:"10px 8px", borderRadius:10, cursor:"pointer",
                      border:"1.5px solid "+(sel ? C.pu : C.bdr),
                      background: sel ? C.pu+"22" : "rgba(255,255,255,.03)",
                      color: sel ? "#c090ff" : C.mu, fontSize:11, fontWeight:700,
                      transition:"all .15s", textAlign:"center", lineHeight:1.3 }}>
                    {s}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Education styled select */}
          <div style={{ marginBottom:14 }}>
            <FieldLabel>{ar?"المستوى الدراسي":lang==="fr"?"Niveau d'études":"Education"}</FieldLabel>
            <div style={{ position:"relative" }}>
              <select value={pf.edu} onChange={function(e){ setField("edu")(e.target.value); setSubmitErr(""); }}
                style={{ width:"100%", padding:"13px 36px 13px 14px", appearance:"none", WebkitAppearance:"none",
                  background:"rgba(255,255,255,.04)", border:"1.5px solid "+(pf.edu ? C.gr : C.bdr),
                  borderRadius:11, color: pf.edu ? C.wh : C.mu, fontSize:13, cursor:"pointer", boxSizing:"border-box" }}>
                <option value="">{ar?"اختر المستوى":lang==="fr"?"Choisir...":"Select..."}</option>
                {eduList.map(function(o){ return <option key={o} value={o}>{o}</option>; })}
              </select>
              <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)",
                color:C.mu, pointerEvents:"none", fontSize:14 }}>▾</span>
            </div>
          </div>

          {/* ── Location ── */}
          <SectionHead icon="📍" title={ar?"الموقع الجغرافي":lang==="fr"?"Localisation":"Location"}/>

          <div style={{ marginBottom: isCasa ? 14 : 0 }}>
            <FieldLabel>{ar?"الجهة":lang==="fr"?"Région":"Region"}</FieldLabel>
            <div style={{ position:"relative" }}>
              <select value={pf.region} onChange={function(e){ setField("region")(e.target.value); setSubmitErr(""); }}
                style={{ width:"100%", padding:"13px 36px 13px 14px", appearance:"none", WebkitAppearance:"none",
                  background:"rgba(255,255,255,.04)", border:"1.5px solid "+(pf.region ? C.gr : C.bdr),
                  borderRadius:11, color: pf.region ? C.wh : C.mu, fontSize:13, cursor:"pointer", boxSizing:"border-box" }}>
                <option value="">{ar?"اختر الجهة":lang==="fr"?"Choisir...":"Select..."}</option>
                {regionList.map(function(o){ return <option key={o} value={o}>{o}</option>; })}
              </select>
              <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)",
                color:C.mu, pointerEvents:"none", fontSize:14 }}>▾</span>
            </div>
          </div>

          {isCasa && (
            <div ref={prefRef} style={{ marginTop:14 }}>
              <div style={{ padding:"8px 12px", background:C.goldP, borderRadius:10,
                  border:"1px solid "+C.gold+"30", marginBottom:10, display:"flex", alignItems:"center", gap:8 }}>
                <span>🏙️</span>
                <p style={{ fontSize:10, color:C.goldL }}>
                  {ar?"حدد العمالة/الإقليم داخل جهة الدار البيضاء-سطات:":lang==="fr"?"Précisez votre préfecture:":"Select your prefecture within Casablanca-Settat:"}
                </p>
              </div>
              <FieldLabel>{ar?"العمالة / المقاطعة":lang==="fr"?"Préfecture":"Prefecture"}</FieldLabel>
              <div style={{ position:"relative" }}>
                <select value={pf.prefecture} onChange={function(e){ setField("prefecture")(e.target.value); setSubmitErr(""); }}
                  style={{ width:"100%", padding:"13px 36px 13px 14px", appearance:"none", WebkitAppearance:"none",
                    background:"rgba(255,255,255,.04)", border:"1.5px solid "+(pf.prefecture ? C.gr : C.gold),
                    borderRadius:11, color: pf.prefecture ? C.wh : C.mu, fontSize:13, cursor:"pointer", boxSizing:"border-box" }}>
                  <option value="">{ar?"اختر":lang==="fr"?"Choisir...":"Select..."}</option>
                  {CASA_OPTIONS.map(function(o){ return <option key={o} value={o}>{o}</option>; })}
                </select>
                <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)",
                  color:C.mu, pointerEvents:"none", fontSize:14 }}>▾</span>
              </div>
            </div>
          )}

          {/* Bottom CTA */}
          <button onClick={handleNext} style={{
            width:"100%", marginTop:24, padding:16,
            background: ok ? "linear-gradient(135deg,"+C.gold+","+C.goldL+")" : "rgba(255,255,255,.06)",
            color: ok ? C.bg : C.mu,
            border: ok ? "none" : "1.5px solid "+C.bdr,
            borderRadius:14, fontFamily:"inherit", fontSize:15, fontWeight:800,
            cursor:"pointer", boxShadow: ok ? "0 6px 24px "+C.goldG : "none",
            transition:"all .25s", display:"flex", alignItems:"center", justifyContent:"center", gap:10
          }}>
            {ok && <span>✓</span>}
            <span>{ar?"التالي →":lang==="fr"?"Suivant →":"Next →"}</span>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── WELCOME ────────────────────────────────────────────────────────────── */
function Welcome({ lang, setLang, user, onStart, onLogout }) {
  var ar = lang === "ar";
  var tests = [
    { n: ar?"اختبار هولاند":lang==="fr"?"Test Holland":"Holland Career Test", d:"30Q · ~20min", ic:"🎯", col:C.teal },
    { n: ar?"مقياس الخمسة الكبار":lang==="fr"?"Big Five Personnalité":"Big Five Personality", d:"25Q · ~15min", ic:"🧠", col:C.gold },
    { n:"Skill Up", d:"20Q · ~12min", ic:"⚡", col:C.pu },
  ];
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <TopBar lang={lang} setLang={setLang} user={user} onLogout={onLogout}/>
      <div style={{ flex:1, overflowY:"auto", padding:"16px 14px 40px", maxWidth:520, margin:"0 auto", width:"100%" }}>
        <div className="fadeUp" style={{ background:"linear-gradient(135deg,"+C.sur+","+C.cardB+")",
            borderRadius:18, padding:"22px 17px", marginBottom:14, border:"1px solid "+C.bdr }}>
          <p style={{ fontSize:11, color:C.mu, marginBottom:4 }}>
            {ar ? "أهلاً،" : lang==="fr" ? "Bonjour," : "Hello,"}{" "}

/* ─── ASSESSMENT ─────────────────────────────────────────────────────────── */
var TIMER_SECS = 10;
var PHASE_SIZES = [30, 25, 20];
var PHASE_COLS  = [C.teal, C.gold, C.pu];
var PHASE_NAMES = ["Holland", "Big Five", "Skill Up"];

function Assessment({ lang, setLang, user, onFinish }) {
  var ar = lang === "ar";
  var [idx, setIdx] = useState(0);
  var [timer, setTimer] = useState(TIMER_SECS);
  var ansRef = useRef({});
  var [, rerender] = useState(0);
  var timerRef = useRef(null);

  var q = ALL_Q[idx];
  var phase = idx < 30 ? 0 : idx < 55 ? 1 : 2;
  var localI = phase===0 ? idx : phase===1 ? idx-30 : idx-55;
  var catKey = q.c || q.t || q.d;
  var catCol = phase===0 ? C.hc[q.c] : phase===1 ? C.b5[q.t] : C.su[q.d];
  var cur = ansRef.current[idx];

  var OPTS_MAIN = {
    en:["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"],
    fr:["Tout à fait d'accord","D'accord","Neutre","Pas d'accord","Pas du tout d'accord"],
    ar:["أوافق بشدة","أوافق","محايد","لا أوافق","لا أوافق بشدة"],
  };
  var OPTS_FREQ = {
    en:["Always","Often","Sometimes","Rarely","Never"],
    fr:["Toujours","Souvent","Parfois","Rarement","Jamais"],
    ar:["دائماً","كثيراً","أحياناً","نادراً","أبداً"],
  };
  var opts = (phase < 2 ? OPTS_MAIN[lang] : OPTS_FREQ[lang]) || OPTS_MAIN.en;

  var timedOut = useRef(false);

  function goNext(sel) {
    clearInterval(timerRef.current);
    if (sel !== null) {
      ansRef.current = Object.assign({}, ansRef.current, { [idx]: sel });
      rerender(function(n) { return n + 1; });
    }
    var nxt = idx + 1;
    if (nxt >= 75) { onFinish(computeScores(ansRef.current)); return; }
    setIdx(nxt);
    setTimer(TIMER_SECS);
  }

  useEffect(function() {
    timedOut.current = false;
    timerRef.current = setInterval(function() {
      setTimer(function(s) {
        if (s <= 1) {
          clearInterval(timerRef.current);
          if (!timedOut.current) {
            timedOut.current = true;
            setTimeout(function() { goNext(null); }, 0);
          }
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return function() { clearInterval(timerRef.current); };
  }, [idx]);

  function goBack() {
    clearInterval(timerRef.current);
    if (idx > 0) { setIdx(idx - 1); setTimer(TIMER_SECS); }
  }

  var timerCol = timer > 12 ? C.teal : timer > 6 ? C.am : C.re;
  var pct = Math.round((idx / 75) * 100);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <div className="noprint" style={{ background:C.sur, borderBottom:"1px solid "+C.bdr, padding:"9px 14px 11px", flexShrink:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span className="sy" style={{ fontSize:11, fontWeight:800, color:PHASE_COLS[phase] }}>{PHASE_NAMES[phase]}</span>
            <span style={{ width:1, height:12, background:C.bdr }}/>
            <span style={{ fontSize:10, color:C.mu }}>{localI+1}/{PHASE_SIZES[phase]}</span>
            <span style={{ fontSize:9, background:PHASE_COLS[phase]+"18", padding:"2px 7px", borderRadius:99, color:PHASE_COLS[phase], fontWeight:700 }}>{pct}%</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:9 }}>
            <LangBtn lang={lang} set={setLang}/>
            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <svg width={44} height={44} style={{ transform:"rotate(-90deg)" }}>
                <circle cx={22} cy={22} r={18} fill="none" stroke={C.bdr} strokeWidth={4}/>
                <circle cx={22} cy={22} r={18} fill="none" stroke={timerCol} strokeWidth={4}
                  strokeDasharray={113.1} strokeDashoffset={113.1*(1-timer/TIMER_SECS)}
                  strokeLinecap="round" style={{ transition:"stroke-dashoffset .9s linear,stroke .3s" }}/>
              </svg>
              <span className="sy" style={{ fontSize:16, fontWeight:800, color:timerCol, minWidth:22 }}>{timer}</span>
            </div>
          </div>
        </div>
        <div style={{ display:"flex", gap:3, alignItems:"center" }}>
          <div style={{ flex:30, height:5, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.min(idx,30)/30*100+"%", background:C.teal, borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:6, height:6, borderRadius:"50%", background:idx>=30?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:25, height:5, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-30,25))/25*100+"%", background:C.gold, borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:6, height:6, borderRadius:"50%", background:idx>=55?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:20, height:5, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-55,20))/20*100+"%", background:C.pu, borderRadius:99, transition:"width .3s" }}/>
          </div>
        </div>
      </div>

      {/* Full screen layout — 5 cards always visible */}
      <div style={{ flex:1, display:"flex", flexDirection:"column",
          padding:"10px 14px 10px", width:"100%", overflow:"hidden" }}>

        {/* Category badge */}
        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:8, flexShrink:0 }}>
          <span style={{ padding:"3px 11px", borderRadius:99, background:catCol+"22",
              border:"1px solid "+catCol+"55", fontSize:10, fontWeight:800, color:catCol,
              letterSpacing:.4, textTransform:"uppercase" }}>
            {catKey}
          </span>
          <span style={{ fontSize:10, color:C.mu }}>{PHASE_NAMES[phase]}</span>
        </div>

        {/* Question */}
        <div style={{ background:C.card, borderRadius:14, padding:"12px 16px",
            border:"1.5px solid "+catCol+"44", marginBottom:10, flexShrink:0,
            boxShadow:"0 0 20px "+catCol+"22" }}>
          <p className={ar ? "ar" : ""} style={{ fontSize:14, fontWeight:600,
              lineHeight:1.55, color:C.wh, direction:ar?"rtl":"ltr", margin:0 }}>
            {q[lang] || q.en}
          </p>
        </div>

        {/* Answer cards — each gets equal share of all remaining height */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", gap:7 }}>
          {opts.map(function(label, i) {
            var isSel = cur === i;
            var CARD_COLS = ["#16a34a","#65a30d","#ca8a04","#ea580c","#dc2626"];
            var col = CARD_COLS[i];
            return (
              <button key={i} onClick={function() { goNext(i); }}
                style={{
                  flex:1,
                  display:"flex", alignItems:"center", gap:16,
                  padding:"0 18px",
                  background: isSel
                    ? "linear-gradient(135deg,"+col+","+col+"cc)"
                    : "rgba(255,255,255,.06)",
                  border: isSel ? "2.5px solid "+col : "1.5px solid rgba(255,255,255,.13)",
                  borderRadius:14,
                  width:"100%", textAlign:"left", cursor:"pointer",
                  transform: isSel ? "scale(1.025)" : "scale(1)",
                  boxShadow: isSel ? "0 8px 28px "+col+"88" : "none",
                  transition:"background .2s,border .2s,transform .15s,box-shadow .2s", fontFamily:"inherit",
                }}>
                {/* Number / checkmark badge */}
                <div style={{
                  width:42, height:42, borderRadius:"50%", flexShrink:0,
                  background: isSel ? "rgba(255,255,255,.28)" : col+"28",
                  border:"2.5px solid "+(isSel ? "rgba(255,255,255,.6)" : col+"66"),
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize: isSel ? 22 : 17, fontWeight:900,
                  color: isSel ? "#fff" : col, transition:"all .15s",
                }}>
                  {isSel ? "\u2713" : (i + 1)}
                </div>
                {/* Label */}
                <span style={{
                  flex:1, fontSize:15, fontWeight: isSel ? 800 : 500,
                  color: isSel ? "#fff" : "rgba(221,238,255,.88)",
                  letterSpacing:".01em", lineHeight:1.3,
                }}>
                  {label}
                </span>
                {isSel && (
                  <span style={{ fontSize:22, color:"rgba(255,255,255,.8)", flexShrink:0 }}>›</span>
                )}
              </button>
            );
          })}
        </div>

        {/* Back button */}
        <div style={{ flexShrink:0, marginTop:7 }}>
          <button onClick={goBack} disabled={idx===0} className="noprint"
            style={{ padding:"5px 14px", background:"transparent", border:"1px solid "+C.bdr,
              borderRadius:99, color:C.mu, fontSize:10, fontWeight:600, opacity:idx===0?0.25:1, cursor:"pointer" }}>
            {ar ? "السابق ←" : lang==="fr" ? "← Retour" : "← Back"}
          </button>
        </div>

      </div>
    </div>
  );
}

function AdvisorDash({ lang, setLang, user, onLogout, cands, onView, onShowReport }) {
  var ar = lang === "ar";
  var [inp, setInp] = useState("");
  var [err, setErr] = useState("");
  var [found, setFound] = useState(null);
  var [rpt, setRpt] = useState(null);

  function doEnroll() {
    var v = inp.trim().toUpperCase();
    if (!v) { setErr("Veuillez entrer un code."); return; }
    var i = cands.findIndex(function(c){
      return (c.code||"").toUpperCase()===v || c.id.toUpperCase()===v;
    });
    if (i < 0) { setFound(null); setErr("Code introuvable."); return; }
    setErr(""); setFound(cands[i]);
  }

  function openRep(role) {
    if (!found) return;
    try {
      var p  = found.profile||{name:found.name,id:found.id,age:"-",gender:"-",edu:"-",region:"-"};
      var sc = found.scores||{h:{},b:{},s:{}};
      setRpt({profile:p, scores:sc, role:role});
    } catch(e){ alert("Erreur: "+e.message); }
  }

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <TopBar lang={lang} setLang={setLang} user={user} onLogout={onLogout}/>
      <div style={{ flex:1, overflowY:"auto", padding:"20px 16px" }}>
        <div style={{ width:"100%", maxWidth:500, margin:"0 auto" }}>
          <div style={{ textAlign:"center", marginBottom:28 }}>
            <div style={{ fontSize:36, marginBottom:8 }}>&#x1F454;</div>
            <h2 className="sy" style={{ fontSize:20, fontWeight:900, color:C.wh, marginBottom:4 }}>
              {lang==="fr"?"Espace Conseiller":"Advisor Portal"}
            </h2>
            <p style={{ fontSize:12, color:C.mu }}>{user.name}</p>
          </div>
          <div style={{ background:C.card, borderRadius:16, padding:"22px 20px",
              border:"1px solid "+C.bdr, marginBottom:14 }}>
            <p style={{ fontSize:12, color:C.mu, marginBottom:12 }}>
              {lang==="fr"?"Collez le code du candidat :":"Paste the candidate result code:"}
            </p>
            <div style={{ display:"flex", gap:8 }}>
              <input value={inp}
                onChange={function(e){setInp(e.target.value);setErr("");setFound(null);}}
                onKeyDown={function(e){if(e.key==="Enter")doEnroll();}}
                placeholder="RPT-AB12"
                style={{ flex:1, padding:"12px 14px", background:"rgba(255,255,255,.06)",
                  border:"1.5px solid "+(err?C.re:C.bdr), borderRadius:10,
                  color:C.wh, fontSize:14, letterSpacing:2, fontFamily:"monospace" }}/>
              <button onClick={doEnroll}
                style={{ padding:"12px 22px", background:"linear-gradient(135deg,"+C.pu+","+C.pu+"cc)",
                  color:"#fff", border:"none", borderRadius:10,
                  fontFamily:"inherit", fontSize:13, fontWeight:800, cursor:"pointer" }}>
                {lang==="fr"?"Inscrire":"Enroll"}
              </button>
            </div>
            {err&&<p style={{ color:C.re, fontSize:11, marginTop:8 }}>{err}</p>}
          </div>
          {found&&(
            <div style={{ background:C.card, borderRadius:16, padding:"20px",
                border:"1.5px solid "+C.teal+"55" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12,
                  marginBottom:16, paddingBottom:14, borderBottom:"1px solid "+C.bdr }}>
                <div style={{ width:42, height:42, borderRadius:10, background:C.teal+"22",
                    border:"1px solid "+C.teal+"44", display:"flex", alignItems:"center",
                    justifyContent:"center", fontSize:22, flexShrink:0 }}>&#x1F393;</div>
                <div>
                  <div style={{ fontWeight:900, fontSize:15, color:C.wh }}>{found.name}</div>
                  <div style={{ fontSize:10, color:C.mu, fontFamily:"monospace" }}>{found.id}</div>
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <button onClick={function(){openRep("candidate");}}
                  style={{ padding:"16px 8px", textAlign:"center",
                    background:"linear-gradient(135deg,#0369a1,#0284c7)",
                    color:"#fff", border:"none", borderRadius:12,
                    fontFamily:"inherit", fontSize:12, fontWeight:800,
                    cursor:"pointer", lineHeight:1.6 }}>
                  &#x1F393;<br/>{lang==="fr"?"Rapport Candidat":"Candidate Report"}
                </button>
                <button onClick={function(){openRep("advisor");}}
                  style={{ padding:"16px 8px", textAlign:"center",
                    background:"linear-gradient(135deg,#dc2626,#b91c1c)",
                    color:"#fff", border:"none", borderRadius:12,
                    fontFamily:"inherit", fontSize:12, fontWeight:800,
                    cursor:"pointer", lineHeight:1.6 }}>
                  &#x1F512;<br/>{lang==="fr"?"Rapport Conseiller":"Advisor Report"}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
      {rpt&&<ReportViewer profile={rpt.profile} scores={rpt.scores} role={rpt.role} onClose={function(){setRpt(null);}}/>}
    </div>
  );
}

function ScoreBar({ label, value, max, col, icon }) {
  max = max || 100;

  col = col || C.teal;
  return (
    <div style={{ marginBottom:9 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
        <span style={{ fontSize:11, color:C.muB, fontWeight:600 }}>{icon && icon+" "}{label}</span>
        <span style={{ fontSize:12, fontWeight:800, color:col }}>{value}</span>
      </div>
      <div style={{ height:6, background:"rgba(255,255,255,.07)", borderRadius:99, overflow:"hidden" }}>

      </div>

  );
}

function AdminDash({ lang, setLang, user, onLogout, cands, onView, advisors, onAddAdvisor, onDeleteAdvisor, onDeleteCand, onShowReport }) {
  var ar = lang === "ar";
  var fr = lang === "fr";

    { name:"Fatima Zahra", id:"FZ291045", code:"RPT-FZ291045", savedAt: new Date(Date.now()-3600000).toISOString(),  profile:{name:"Fatima Zahra",firstName:"Fatima",lastName:"Zahra",age:"18–20",gender:"Female",edu:"Baccalaureate",region:"Casablanca-Settat",prefecture:"Anfa",phone:"+212698765432",status:"High School Student",email:"fatima@example.com"}, scores:{h:{R:30,I:55,A:88,S:75,E:60,C:42},b:{O:90,C2:50,E2:78,A2:70,N:45},s:{A:82,E:65,C:70,R:74}} },
  ];

  var src  = cands.length ? cands : DEMO;
  var HCOLS = {R:"#1aabaa",I:"#8b5cf6",A:"#d4a328",S:"#22c55e",E:"#f97316",C:"#6b8aaa"};
  var HN   = {R:"Réaliste",I:"Investigateur",A:"Artistique",S:"Social",E:"Entrepreneur",C:"Conventionnel"};

  /* ── filtered list ── */
  var list = src.filter(function(c) {
    var q  = search.toLowerCase();
    var p  = c.profile || {};
    var ht = ranked(c.scores&&c.scores.h||{});
    return (!q || c.name.toLowerCase().includes(q) || c.id.toLowerCase().includes(q) || (p.email||"").toLowerCase().includes(q))
      && (!filterRegion  || p.region  === filterRegion)
      && (!filterGender  || p.gender  === filterGender)
      && (!filterHolland || ht[0]     === filterHolland);
  }).slice().sort(function(a,b){
    var va = sortCol==="name" ? a.name : sortCol==="emp" ? avg(a.scores&&a.scores.s||{}) : (a.savedAt||"");
    var vb = sortCol==="name" ? b.name : sortCol==="emp" ? avg(b.scores&&b.scores.s||{}) : (b.savedAt||"");
    return sortDir==="asc" ? (va>vb?1:-1) : (va<vb?1:-1);
  });

  /* ── KPIs ── */
  var total   = src.length;
  var avgEmp  = total ? Math.round(src.reduce(function(acc,c){ return acc+avg(c.scores&&c.scores.s||{}); },0)/total) : 0;
  var hollandCounts = {};
  src.forEach(function(c){ var r=ranked(c.scores&&c.scores.h||{})[0]; if(r) hollandCounts[r]=(hollandCounts[r]||0)+1; });
  var topHL = Object.entries(hollandCounts).sort(function(a,b){return b[1]-a[1];})[0];
  var recent = src.slice().sort(function(a,b){return (b.savedAt||"")>(a.savedAt||"")?1:-1;}).slice(0,6);
  var regions = {}; src.forEach(function(c){ var r=(c.profile&&c.profile.region)||"—"; regions[r]=(regions[r]||0)+1; });
  var topRegions = Object.entries(regions).sort(function(a,b){return b[1]-a[1];}).slice(0,6);

  /* ── helpers ── */
  function exportExcel() {
    var headers = ["Prénom","Nom","ID","Email","Téléphone","Age","Genre","Education","Situation","Region","Prefecture","Code","Holland","Employabilite","R","I","A","S","E","C","O","C2","E2","A2","N","Autonomie","Economique","Collaboration","Readiness"];
    var rows = src.map(function(c) {
      var ht=ranked(c.scores&&c.scores.h||{}); var sv=Object.values(c.scores&&c.scores.s||{});
      var emp=sv.length?Math.round(sv.reduce(function(a,b){return a+b;},0)/sv.length):0;
      var h=c.scores&&c.scores.h||{}; var b5=c.scores&&c.scores.b||{}; var s=c.scores&&c.scores.s||{}; var p=c.profile||{};
      return [p.firstName||c.name,p.lastName||"",c.id,p.email||"",p.phone||"",p.age||"",p.gender||"",p.edu||"",p.status||"",p.region||"",p.prefecture||"",c.code||"",
              (ht[0]||"")+(ht[1]||""),emp,h.R||0,h.I||0,h.A||0,h.S||0,h.E||0,h.C||0,b5.O||0,b5.C2||0,b5.E2||0,b5.A2||0,b5.N||0,s.A||0,s.E||0,s.C||0,s.R||0];
    });
    var csv="﻿"+[headers].concat(rows).map(function(r){return r.join(";");}).join("\n");
    try { var blob=new Blob([csv],{type:"text/csv;charset=utf-8"}); var url=URL.createObjectURL(blob); var a=document.createElement("a"); a.href=url; a.download="CareerMap-Candidates.csv"; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},200); } catch(e){ alert("Export failed: "+e.message); }
  }
  function exportAdvisors() {
    var csv="﻿"+["Name,Code,Created"].concat(advisors.map(function(a){return [a.name,a.code,a.createdAt||""].join(",");})).join("\n");
    try { var blob=new Blob([csv],{type:"text/csv;charset=utf-8"}); var url=URL.createObjectURL(blob); var a=document.createElement("a"); a.href=url; a.download="CareerMap-Advisors.csv"; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},200); } catch(e){}
  }
  function genCode(name) {
    var parts=name.trim().split(/\s+/); var last=(parts[parts.length-1]||parts[0]).toLowerCase().replace(/[^a-z]/g,"");
    var base="@"+last+"ADV"; var code=base; var n=2;
    while(advisors.some(function(a){return a.code.toLowerCase()===code.toLowerCase();})){code=base.replace("ADV",n+"ADV");n++;}
    return code;
  }
  function createAdvisor() {
    if (!newName.trim()) return;
    onAddAdvisor({ name:newName.trim(), code:genCode(newName), createdAt:new Date().toLocaleDateString() });
    setNewName("");
  }
  function copyCode(code) {
    try { navigator.clipboard.writeText(code); } catch(e) {}
    setCopied(code); setTimeout(function(){ setCopied(null); }, 2000);

  function downloadReport(c, role) {

      <div style={{ display:"flex",background:C.sur,borderBottom:"1px solid "+C.bdr,flexShrink:0 }}>

                        <div style={{ fontSize:9,color:emp>=65?C.gr:emp>=45?C.gold:C.re,fontWeight:700 }}>{emp}%</div>

                    </div>

                {["R","I","A","S","E","C"].map(function(code){

                    <div style={{ display:"flex",alignItems:"flex-start",gap:11 }}>
                      <div style={{ width:44,height:44,borderRadius:12,background:col+"18",border:"1.5px solid "+col+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:col,flexShrink:0 }}>

                          </div>

                        <div style={{ display:"flex",alignItems:"center",gap:8,marginTop:8 }}>
                          <div style={{ flex:1,height:5,background:"rgba(255,255,255,.07)",borderRadius:99,overflow:"hidden" }}>
                            <div style={{ height:"100%",width:emp+"%",background:emp>=65?C.gr:emp>=45?C.gold:C.re,borderRadius:99 }}/>
                          </div>
                          <span style={{ fontSize:9,fontWeight:700,color:emp>=65?C.gr:emp>=45?C.gold:C.re,flexShrink:0 }}>{emp}%</span>

                        <div style={{ display:"flex",gap:5,marginTop:7,flexWrap:"wrap" }}>
                          {[p.age,p.gender,p.edu&&p.edu.split(" ")[0],p.status&&p.status.split("/")[0]].filter(Boolean).map(function(tag,j){

                        </div>
                      </div>
                    </div>
                  </div>
                );

          </div>
        )}
        {tab==="advisors" && (
          <div style={{ padding:"12px" }}>
            <div style={{ background:C.sur,border:"1px solid "+C.bdr,borderRadius:14,padding:"16px",marginBottom:12 }}>
              <div style={{ fontSize:12,fontWeight:800,color:C.wh,marginBottom:6 }}>➕ New Advisor Account</div>
              <p style={{ fontSize:10,color:C.mu,marginBottom:12,lineHeight:1.6 }}>
                Enter the advisor's full name — a unique <code style={{ color:"#8b5cf6" }}>@nameADV</code> login code will be generated automatically.
              </p>
              <div style={{ display:"flex",gap:8 }}>
                <input value={newName} onChange={function(e){setNewName(e.target.value);}}
                  onKeyDown={function(e){if(e.key==="Enter")createAdvisor();}}
                  placeholder="Advisor full name…"
                  style={{ flex:1,padding:"10px 13px",background:"rgba(255,255,255,.04)",border:"1.5px solid "+C.bdr,borderRadius:10,color:C.wh,fontSize:12 }}/>
                <button onClick={createAdvisor} disabled={!newName.trim()}
                  style={{ padding:"10px 18px",background:newName.trim()?"linear-gradient(135deg,#7c3aed,#6d28d9)":"rgba(255,255,255,.05)",
                    color:newName.trim()?C.wh:C.mu,border:"none",borderRadius:10,fontFamily:"inherit",fontSize:12,fontWeight:800 }}>

              </div>

              ? <div style={{ textAlign:"center",padding:"40px 20px",color:C.mu,fontSize:12 }}>No advisor accounts yet. Create one above.</div>

}

function AdminStats({ src, lang, ar }) {
  if (!src || src.length===0) {
    return <div style={{ padding:20,textAlign:"center",color:"#6b8aaa",fontSize:12 }}>No candidate data yet.</div>;
  }
  function cnt(arr){ var m={}; arr.forEach(function(v){m[v]=(m[v]||0)+1;}); return m; }
  function pct(n,t){ return t?Math.round(n/t*100):0; }
  function Bar({ label, value, max, color, total }) {
    var p = max?Math.round(value/max*100):0;
    return (
      <div style={{ marginBottom:8 }}>
        <div style={{ display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:3 }}>
          <span style={{ color:"#8fadc8",maxWidth:"65%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{label}</span>
          <span style={{ color:color,fontWeight:700 }}>{value} <span style={{ color:"#6b8aaa" }}>({pct(value,total)}%)</span></span>
        </div>
        <div style={{ height:8,background:"rgba(255,255,255,.06)",borderRadius:99,overflow:"hidden" }}>
          <div style={{ height:"100%",width:p+"%",background:color,borderRadius:99,transition:"width .8s" }}/>
        </div>
      </div>
    );
  }
  function Section({ title, icon, children }) {
    return (
      <div style={{ background:"#0d1f33",border:"1px solid #1a3a55",borderRadius:14,padding:"14px",marginBottom:12 }}>
        <div style={{ fontSize:11,fontWeight:800,color:"#f0f4f8",marginBottom:12 }}>{icon} {title}</div>
        {children}
      </div>
    );
  }

  var total   = src.length;
  var genders = cnt(src.map(function(c){return (c.profile&&c.profile.gender)||"Unknown";}));
  var ages    = cnt(src.map(function(c){return (c.profile&&c.profile.age)||"Unknown";}));
  var regions = cnt(src.map(function(c){return (c.profile&&c.profile.region)||"Unknown";}));
  var edus    = cnt(src.map(function(c){return (c.profile&&c.profile.edu)||"Unknown";}));
  var statuses= cnt(src.map(function(c){return (c.profile&&c.profile.status)||"Unknown";}));
  var hollands= cnt(src.map(function(c){return ranked(c.scores&&c.scores.h||{})[0]||"Unknown";}));
  var HCOLS   = {R:"#1aabaa",I:"#8b5cf6",A:"#d4a328",S:"#22c55e",E:"#f97316",C:"#6b8aaa"};
  var HN      = {R:"Réaliste",I:"Investigateur",A:"Artistique",S:"Social",E:"Entrepreneur",C:"Conventionnel"};
  var maxReg  = Math.max.apply(null,Object.values(regions).concat([1]));
  var maxEdu  = Math.max.apply(null,Object.values(edus).concat([1]));
  var maxSt   = Math.max.apply(null,Object.values(statuses).concat([1]));

  var empScores= src.map(function(c){return avg(c.scores&&c.scores.s||{});});
  var avgEmp  = empScores.length?Math.round(empScores.reduce(function(a,b){return a+b;},0)/empScores.length):0;
  var high    = empScores.filter(function(v){return v>=65;}).length;
  var mid     = empScores.filter(function(v){return v>=45&&v<65;}).length;
  var low     = empScores.filter(function(v){return v<45;}).length;

  var avgH    = {R:0,I:0,A:0,S:0,E:0,C:0};
  var avgB5   = {O:0,C2:0,E2:0,A2:0,N:0};
  var avgSU   = {A:0,E:0,C:0,R:0};
  src.forEach(function(c){
    var h=c.scores&&c.scores.h||{}; var b=c.scores&&c.scores.b||{}; var s=c.scores&&c.scores.s||{};
    ["R","I","A","S","E","C"].forEach(function(k){avgH[k]+=(h[k]||0)/total;});
    ["O","C2","E2","A2","N"].forEach(function(k){avgB5[k]+=(b[k]||0)/total;});
    ["A","E","C","R"].forEach(function(k){avgSU[k]+=(s[k]||0)/total;});
  });

  return (
    <div style={{ padding:"12px" }}>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12 }}>
        {[
          {label:"Total",value:total,color:"#1aabaa",icon:"👥"},
          {label:"Avg Empl.",value:avgEmp+"%",color:"#d4a328",icon:"⚡"},
          {label:"High ≥65%",value:high,color:"#22c55e",icon:"🟢"},
        ].map(function(k,i){
          return <div key={i} style={{ background:"#0d1f33",border:"1.5px solid "+k.color+"33",borderRadius:12,padding:"12px 10px",textAlign:"center" }}>
            <div style={{ fontSize:18 }}>{k.icon}</div>
            <div style={{ fontSize:"clamp(18px,4vw,24px)",fontWeight:900,color:k.color }}>{k.value}</div>
            <div style={{ fontSize:9,color:"#6b8aaa",marginTop:2 }}>{k.label}</div>
          </div>;
        })}
      </div>
      <Section title="Employability Distribution" icon="⚡">
        {[["🟢 High ≥65%",high,"#22c55e"],["🟡 Medium 45–64%",mid,"#d4a328"],["🔴 Low <45%",low,"#ef4444"]].map(function(item,i){
          return <Bar key={i} label={item[0]} value={item[1]} max={total} color={item[2]} total={total}/>;
        })}
        <div style={{ display:"flex",alignItems:"center",gap:10,marginTop:10,padding:"10px",background:"rgba(255,255,255,.03)",borderRadius:9 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:9,color:"#6b8aaa",marginBottom:3 }}>Platform Average</div>
            <div style={{ height:10,background:"rgba(255,255,255,.06)",borderRadius:99,overflow:"hidden" }}>
              <div style={{ height:"100%",width:avgEmp+"%",background:"linear-gradient(90deg,#1aabaa,#d4a328)",borderRadius:99 }}/>
            </div>
          </div>
          <div style={{ fontSize:20,fontWeight:900,color:avgEmp>=65?"#22c55e":avgEmp>=45?"#d4a328":"#ef4444" }}>{avgEmp}%</div>
        </div>
      </Section>
      <Section title="Holland RIASEC — Average Scores" icon="🧰">
        {["R","I","A","S","E","C"].map(function(code){
          var v=Math.round(avgH[code]);
          return <Bar key={code} label={code+" — "+HN[code]} value={v} max={100} color={HCOLS[code]} total={100}/>;
        })}
      </Section>
      <Section title="Big Five OCEAN — Average Scores" icon="🌊">
        {[["O","Openness","#8b5cf6"],["C2","Conscientiousness","#8b5cf6"],["E2","Extraversion","#8b5cf6"],["A2","Agreeableness","#8b5cf6"],["N","Emot. Stability","#8b5cf6"]].map(function(item){
          var v=Math.round(avgB5[item[0]]);
          return <Bar key={item[0]} label={item[0].replace("2","")+" — "+item[1]} value={v} max={100} color={item[2]} total={100}/>;
        })}
      </Section>
      <Section title="Skill Up — Average Scores" icon="⚡">
        {[["A","Autonomie","#d4a328"],["E","Esprit Éco.","#d4a328"],["C","Collaboration","#d4a328"],["R","Readiness","#d4a328"]].map(function(item){
          var v=Math.round(avgSU[item[0]]);
          return <Bar key={item[0]} label={item[0]+" — "+item[1]} value={v} max={100} color={item[2]} total={100}/>;
        })}
      </Section>
      <Section title="Gender Distribution" icon="Gender">
        {Object.entries(genders).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
          return <Bar key={i} label={item[0]} value={item[1]} max={total} color={i===0?"#1aabaa":"#8b5cf6"} total={total}/>;
        })}
      </Section>
      <Section title="Age Distribution" icon="🎂">
        {["Under 18","18–20","21–24","25–29","30–35","36+"].map(function(age,i){
          var v=ages[age]||0;
          return v>0?<Bar key={i} label={age} value={v} max={total} color="#1aabaa" total={total}/>:null;
        })}
      </Section>
      {Object.keys(statuses).length>0 && (
        <Section title="Occupation Status" icon="💼">
          {Object.entries(statuses).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
            var cols=["#1aabaa","#8b5cf6","#d4a328","#22c55e","#f97316","#6b8aaa"];
            return <Bar key={i} label={item[0]} value={item[1]} max={maxSt} color={cols[i%cols.length]} total={total}/>;
          })}
        </Section>
      )}
      <Section title="Education Level" icon="🎓">
        {Object.entries(edus).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
          return <Bar key={i} label={item[0]} value={item[1]} max={maxEdu} color="#d4a328" total={total}/>;
        })}
      </Section>
      <Section title="Regional Distribution" icon="📍">
        {Object.entries(regions).sort(function(a,b){return b[1]-a[1];}).slice(0,8).map(function(item,i){
          return <Bar key={i} label={item[0]} value={item[1]} max={maxReg} color="#1aabaa" total={total}/>;
        })}
      </Section>
    </div>
  );
}

function ShareQRModal({ onClose }) {
  var canvasRef = React.useRef(null);
  var url = (function() {
    var u = window.location.href.replace(/[?#].*$/, '').replace(/index\.html$/, '');
    return u.endsWith('/') ? u : u + '/';
  })();

  useEffect(function() {
    if (!canvasRef.current || !window.QRCode) return;
    QRCode.toCanvas(canvasRef.current, url, {
      width: 240, margin: 2,
      color: { dark: '#06111f', light: '#ffffff' }
    });
  }, []);

  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:99999,
      background:'#06111f',
      display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
